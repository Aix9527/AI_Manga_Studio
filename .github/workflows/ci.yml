name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          git rev-parse HEAD
          git status --short

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip check
          python -m pip freeze

      - name: Compile active Python sources
        run: |
          python -m compileall -q \
            backend/app \
            backend/modules \
            backend/shared \
            tests \
            scripts \
            run.py

      - name: Run Ruff
        run: |
          python -m ruff check \
            backend/app \
            backend/modules \
            backend/shared

      - name: Verify application import
        run: |
          python - <<'PY'
          from backend.app.main import app

          print("Application title:", app.title)
          print("Registered routes:", len(app.routes))

          assert app.title == "AI Manga Studio"
          assert len(app.routes) > 0
          PY

      - name: Run smoke tests
        run: |
          python -m pytest \
            tests/test_app_smoke.py \
            tests/test_database_manager.py \
            tests/test_provider_registry.py \
            tests/test_core_imports.py \
            -vv \
            -x \
            --tb=long

      - name: Run remaining tests
        run: |
          python -m pytest \
            -vv \
            --maxfail=1 \
            --tb=long

      - name: Run mypy diagnostics
        continue-on-error: true
        run: |
          python -m mypy \
            backend/app \
            backend/modules/platform \
            backend/modules/generation/infrastructure/provider_registry.py

      - name: Show generated repository changes
        if: always()
        run: |
          echo "Repository status after CI:"
          git status --short

      - name: Verify working tree remains clean
        shell: bash
        run: |
          changes="$(git status --porcelain)"

          if [ -n "$changes" ]; then
            echo "CI generated unexpected repository changes:"
            echo "$changes"
            exit 1
          fi
