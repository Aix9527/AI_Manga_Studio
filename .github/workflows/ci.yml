name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Compile all Python sources
        run: python -m compileall -q backend tests scripts run.py

      - name: Run Ruff
        run: ruff check backend tests scripts run.py

      - name: Verify application import
        run: |
          python -c "from backend.app.main import app; assert app.title == 'AI Manga Studio'"

      - name: Run complete test suite
        run: pytest -q --maxfail=1

      - name: Run mypy diagnostics
        continue-on-error: true
        run: |
          mypy \
            backend/app \
            backend/modules/platform \
            backend/modules/generation/infrastructure/provider_registry.py

      - name: Verify working tree remains clean
        shell: bash
        run: |
          changes="$(git status --porcelain)"
          if [ -n "$changes" ]; then
            echo "$changes"
            exit 1
          fi
